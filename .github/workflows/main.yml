name: CareerGraph API CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: careergraph-api-main
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'careergraph-api' }}
  SONARQUBE_HOST: ${{ secrets.SONARQUBE_HOST }}
  SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

jobs:
  build-and-push:
    name: Build, Test, Scan, Push Image
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.image_vars.outputs.image_tag }}
      image_repo: ${{ steps.image_vars.outputs.image_repo }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: maven

      - name: Unit tests
        run: ./mvnw -B test

      - name: Build package
        run: ./mvnw -B -DskipTests clean package

      - name: SonarQube scan (optional)
        if: ${{ env.SONARQUBE_HOST != '' && env.SONARQUBE_TOKEN != '' }}
        uses: kitabisa/sonarqube-action@v1.2.0
        env:
          SONAR_SCANNER_OPTS: -X
        with:
          host: ${{ env.SONARQUBE_HOST }}
          login: ${{ env.SONARQUBE_TOKEN }}
          projectBaseDir: src/
          projectKey: ${{ vars.SONAR_PROJECT_KEY || 'careergraph-api' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Resolve image coordinates
        id: image_vars
        run: |
          echo "image_repo=${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_vars.outputs.image_repo }}
          tags: |
            type=raw,value=${{ steps.image_vars.outputs.image_tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-22.04
    needs: build-and-push
    environment: production

    steps:
      - name: Validate SSH deploy secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "Missing secret: VPS_HOST"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "Missing secret: VPS_USER"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}" ]; then
            echo "Missing SSH private key secret. Set VPS_SSH_PRIVATE_KEY or VPS_SSH_KEY."
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_ENV_PROD: ${{ secrets.APP_ENV_PROD }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          IMAGE_REPO: ${{ needs['build-and-push'].outputs.image_repo }}
          IMAGE_TAG: ${{ needs['build-and-push'].outputs.image_tag }}
          APP_HEALTHCHECK_URL: ${{ vars.APP_HEALTHCHECK_URL || 'http://127.0.0.1:8080/careergraph/api/v1/actuator/health' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT || secrets.VPS_SSH_PORT || 22 }}
          envs: APP_ENV_PROD,DOCKER_HUB_USERNAME,DOCKER_HUB_ACCESS_TOKEN,VPS_APP_DIR,IMAGE_REPO,IMAGE_TAG,APP_HEALTHCHECK_URL
          script_stop: true
          script: |
            set -e

            if [ -z "$VPS_APP_DIR" ]; then
              echo "VPS_APP_DIR is empty. Set this secret to your project path on VPS."
              exit 1
            fi

            cd "$VPS_APP_DIR"

            if [ ! -f "docker-compose.prod.yaml" ]; then
              echo "docker-compose.prod.yaml not found in VPS_APP_DIR."
              exit 1
            fi

            if [ -z "$APP_ENV_PROD" ]; then
              echo "APP_ENV_PROD is empty. Add production env content to GitHub Secret APP_ENV_PROD."
              exit 1
            fi

            if [ -z "$IMAGE_REPO" ] || [ -z "$IMAGE_TAG" ]; then
              echo "IMAGE_REPO or IMAGE_TAG is empty. Build output is invalid."
              exit 1
            fi

            {
              printf "%s\n" "$APP_ENV_PROD"
              printf "DOCKER_IMAGE_REPO=%s\n" "$IMAGE_REPO"
              printf "IMAGE_TAG=%s\n" "$IMAGE_TAG"
            } > .env

            echo "$DOCKER_HUB_ACCESS_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin

            docker compose -f docker-compose.prod.yaml pull careergraph-api
            docker compose -f docker-compose.prod.yaml up -d careergraph-api

            echo "Waiting for service health endpoint: $APP_HEALTHCHECK_URL"
            for i in $(seq 1 30); do
              if curl -fsS "$APP_HEALTHCHECK_URL" > /dev/null; then
                echo "Deploy succeeded. Service is healthy."
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed after deploy. Recent API logs:"
            docker compose -f docker-compose.prod.yaml logs --tail=200 careergraph-api || true
            exit 1
