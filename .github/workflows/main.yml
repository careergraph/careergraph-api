name: CareerGraph API CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: careergraph-api-main
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'careergraph-api' }}
  SONARQUBE_HOST: ${{ secrets.SONARQUBE_HOST }}
  SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

jobs:
  build-and-push:
    name: Build, Test, Scan, Push Image
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.image_vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: maven

      # - name: Unit tests
      #   run: ./mvnw -B test

      - name: Build package
        run: ./mvnw -B -DskipTests clean package

      - name: SonarQube scan (optional)
        if: ${{ env.SONARQUBE_HOST != '' && env.SONARQUBE_TOKEN != '' }}
        uses: kitabisa/sonarqube-action@v1.2.0
        env:
          SONAR_SCANNER_OPTS: -X
        with:
          host: ${{ env.SONARQUBE_HOST }}
          login: ${{ env.SONARQUBE_TOKEN }}
          projectBaseDir: src/
          projectKey: ${{ vars.SONAR_PROJECT_KEY || 'careergraph-api' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Resolve image coordinates
        id: image_vars
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image_vars.outputs.image_tag }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-22.04
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate SSH deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          APP_ENV_PROD: ${{ secrets.APP_ENV_PROD }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "Missing secret: VPS_HOST"
            exit 1
          fi

          if [ -z "$VPS_USER" ]; then
            echo "Missing secret: VPS_USER"
            exit 1
          fi

          if [ -z "$VPS_SSH_PRIVATE_KEY" ]; then
            echo "Missing SSH private key secret. Set VPS_SSH_PRIVATE_KEY or VPS_SSH_KEY."
            exit 1
          fi

          if [ -z "$VPS_APP_DIR" ]; then
            echo "Missing secret: VPS_APP_DIR"
            exit 1
          fi

          if [ -z "$APP_ENV_PROD" ]; then
            echo "Missing secret: APP_ENV_PROD"
            exit 1
          fi

          if [ ! -f "docker-compose.prod.yaml" ]; then
            echo "Missing file: docker-compose.prod.yaml"
            exit 1
          fi

      - name: Upload compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT || secrets.VPS_SSH_PORT || 22 }}
          source: docker-compose.prod.yaml
          target: ${{ secrets.VPS_APP_DIR }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_ENV_PROD: ${{ secrets.APP_ENV_PROD }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          IMAGE_REPO: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs['build-and-push'].outputs.image_tag }}
          APP_HEALTHCHECK_URL: ${{ vars.APP_HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT || secrets.VPS_SSH_PORT || 22 }}
          envs: APP_ENV_PROD,DOCKER_HUB_USERNAME,DOCKER_HUB_ACCESS_TOKEN,VPS_APP_DIR,IMAGE_REPO,IMAGE_TAG,APP_HEALTHCHECK_URL
          script_stop: true
          script: |
            set -e

            log_step() {
              echo "[deploy-api][$(date -u +'%Y-%m-%dT%H:%M:%SZ')] $1"
            }

            wait_for_service_ready() {
              service_name="$1"
              timeout_seconds="$2"
              interval_seconds=5
              attempts=$((timeout_seconds / interval_seconds))

              if [ "$attempts" -le 0 ]; then
                attempts=1
              fi

              log_step "Waiting for service '$service_name' to be ready"

              for i in $(seq 1 "$attempts"); do
                container_id=$(docker compose -f "$COMPOSE_FILE_TMP" ps -q "$service_name" | head -n 1)

                if [ -n "$container_id" ]; then
                  container_state=$(docker inspect -f '{{.State.Status}}' "$container_id" 2>/dev/null || echo "unknown")
                  health_state=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id" 2>/dev/null || echo "unknown")

                  if [ "$container_state" = "running" ] && { [ "$health_state" = "healthy" ] || [ "$health_state" = "none" ]; }; then
                    log_step "Service '$service_name' is ready (state=$container_state, health=$health_state)"
                    return 0
                  fi

                  if [ "$container_state" = "exited" ] || [ "$container_state" = "dead" ]; then
                    log_step "Service '$service_name' container stopped unexpectedly (state=$container_state)"
                    docker compose -f "$COMPOSE_FILE_TMP" logs --tail=120 "$service_name" || true
                    return 1
                  fi
                fi

                if [ $((i % 6)) -eq 0 ]; then
                  elapsed=$((i * interval_seconds))
                  log_step "Service '$service_name' not ready after ${elapsed}s"
                fi

                sleep "$interval_seconds"
              done

              log_step "Timed out waiting for service '$service_name'"
              docker compose -f "$COMPOSE_FILE_TMP" ps "$service_name" || true
              docker compose -f "$COMPOSE_FILE_TMP" logs --tail=120 "$service_name" || true
              return 1
            }

            prune_repo_images() {
              repo="$1"
              keep_tag_a="$2"
              keep_tag_b="$3"

              if [ -z "$repo" ]; then
                return 0
              fi

              log_step "Pruning old images for $repo (keeping tags: $keep_tag_a, $keep_tag_b)"

              docker image ls "$repo" --format '{{.Repository}}:{{.Tag}}' \
                | grep -v '<none>' \
                | grep -v ":${keep_tag_a}$" \
                | grep -v ":${keep_tag_b}$" \
                | sort -u \
                | while read -r image_ref; do
                    if [ -n "$image_ref" ]; then
                      docker image rm -f "$image_ref" || true
                    fi
                  done

              docker image prune -f || true
            }

            log_step "Starting API deployment script"

            if [ -z "$VPS_APP_DIR" ]; then
              echo "VPS_APP_DIR is empty. Set this secret to your project path on VPS."
              exit 1
            fi

            cd "$VPS_APP_DIR"
            APP_DIR_ABS="$(pwd)"
            log_step "Changed directory to $APP_DIR_ABS"

            log_step "Cleaning legacy temporary deploy files from previous workflow versions"
            find "$APP_DIR_ABS" -maxdepth 1 -type f \( -name "docker-compose-api-*.yaml" -o -name "env-api-*.list" \) -delete || true

            DEPLOY_TMP_DIR="$(mktemp -d)"
            COMPOSE_SOURCE_FILE="$APP_DIR_ABS/docker-compose.prod.yaml"
            COMPOSE_FILE_TMP="$DEPLOY_TMP_DIR/docker-compose.yaml"
            ENV_FILE_TMP="$DEPLOY_TMP_DIR/.env"
            log_step "Created temporary deploy directory: $DEPLOY_TMP_DIR"

            cleanup() {
              log_step "Cleaning up temporary deploy directory"
              rm -rf "$DEPLOY_TMP_DIR"
              rm -f "$COMPOSE_SOURCE_FILE"
              find "$APP_DIR_ABS" -maxdepth 1 -type f \( -name "docker-compose-api-*.yaml" -o -name "env-api-*.list" \) -delete || true
            }
            trap cleanup EXIT

            if [ -z "$APP_ENV_PROD" ]; then
              echo "APP_ENV_PROD is empty. Add production env content to GitHub Secret APP_ENV_PROD."
              exit 1
            fi

            if [ -z "$IMAGE_REPO" ] || [ -z "$IMAGE_TAG" ]; then
              echo "IMAGE_REPO or IMAGE_TAG is empty. Build output is invalid."
              exit 1
            fi

            if [ ! -f "$COMPOSE_SOURCE_FILE" ]; then
              echo "docker-compose.prod.yaml is missing on VPS. Upload step may have failed."
              exit 1
            fi

            cp "$COMPOSE_SOURCE_FILE" "$COMPOSE_FILE_TMP"
            log_step "Copied docker-compose.prod.yaml to temporary compose file"

            {
              printf "%s\n" "$APP_ENV_PROD"
              printf "DOCKER_IMAGE_REPO=%s\n" "$IMAGE_REPO"
              printf "IMAGE_TAG=%s\n" "$IMAGE_TAG"
              printf "DOCKER_IMAGE_REPO_API=%s\n" "$IMAGE_REPO"
              printf "IMAGE_TAG_API=%s\n" "$IMAGE_TAG"
            } > "$ENV_FILE_TMP"
            log_step "Wrote runtime environment to temporary env file"

            set -a
            . "$ENV_FILE_TMP"
            set +a
            log_step "Loaded runtime environment variables"

            log_step "Logging in to Docker registry"
            echo "$DOCKER_HUB_ACCESS_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
            log_step "Docker login succeeded"

            prune_repo_images "$IMAGE_REPO" "$IMAGE_TAG" "latest"

            log_step "Pulling API image"
            docker compose -f "$COMPOSE_FILE_TMP" pull careergraph-api
            log_step "Pull completed"

            log_step "Ensuring infrastructure dependencies are running"
            docker compose -f "$COMPOSE_FILE_TMP" up -d careergraph-db careergraph-redis careergraph-elasticsearch

            wait_for_service_ready careergraph-db 180
            wait_for_service_ready careergraph-redis 180
            wait_for_service_ready careergraph-elasticsearch 240

            log_step "Starting API container"
            docker compose -f "$COMPOSE_FILE_TMP" up -d --no-deps careergraph-api
            log_step "Container start command completed"

            API_HOST_PORT=$(docker compose -f "$COMPOSE_FILE_TMP" port careergraph-api "${SERVER_PORT_CONTAINER:-8080}" | tail -n 1 | awk -F: '{print $NF}')
            if [ -z "$API_HOST_PORT" ]; then
              echo "Cannot resolve published port for careergraph-api."
              docker compose -f "$COMPOSE_FILE_TMP" ps careergraph-api || true
              exit 1
            fi
            log_step "Resolved published API port: $API_HOST_PORT"
            SERVER_CONTEXT_PATH="${SERVER_SERVLET_CONTEXT_PATH:-/careergraph/api/v1}"
            SERVER_CONTEXT_PATH="${SERVER_CONTEXT_PATH%/}"

            CANDIDATE_HEALTHCHECK_URLS=""
            if [ -n "$APP_HEALTHCHECK_URL" ]; then
              CANDIDATE_HEALTHCHECK_URLS="$APP_HEALTHCHECK_URL"
            fi
            CANDIDATE_HEALTHCHECK_URLS="$CANDIDATE_HEALTHCHECK_URLS http://127.0.0.1:${API_HOST_PORT}${SERVER_CONTEXT_PATH}/actuator/health"
            CANDIDATE_HEALTHCHECK_URLS="$CANDIDATE_HEALTHCHECK_URLS http://127.0.0.1:${API_HOST_PORT}/actuator/health"
            CANDIDATE_HEALTHCHECK_URLS="$CANDIDATE_HEALTHCHECK_URLS http://127.0.0.1:${API_HOST_PORT}${SERVER_CONTEXT_PATH}/v3/api-docs"

            HEALTHCHECK_TIMEOUT_SECONDS=300
            HEALTHCHECK_INTERVAL_SECONDS=5
            HEALTHCHECK_ATTEMPTS=$((HEALTHCHECK_TIMEOUT_SECONDS / HEALTHCHECK_INTERVAL_SECONDS))

            log_step "Starting health checks"
            echo "[deploy-api] Healthcheck candidates: $CANDIDATE_HEALTHCHECK_URLS"

            for url in $CANDIDATE_HEALTHCHECK_URLS; do
              if [ -z "$url" ]; then
                continue
              fi

              log_step "Trying healthcheck URL: $url"
              for i in $(seq 1 "$HEALTHCHECK_ATTEMPTS"); do
                if curl -fsS "$url" > /dev/null; then
                  log_step "Healthcheck succeeded at: $url"
                  log_step "Pruning old API images from VPS"
                  prune_repo_images "$IMAGE_REPO" "$IMAGE_TAG" "latest"
                  log_step "Deployment completed successfully"
                  exit 0
                fi
                if [ $((i % 6)) -eq 0 ]; then
                  log_step "Healthcheck still pending for $url after $((i * HEALTHCHECK_INTERVAL_SECONDS)) seconds"
                fi
                sleep "$HEALTHCHECK_INTERVAL_SECONDS"
              done
              log_step "Healthcheck URL failed after timeout: $url"
            done

            log_step "Health checks failed. Dumping recent API logs"
            echo "Health check failed after deploy. Tried URLs: $CANDIDATE_HEALTHCHECK_URLS. Recent API logs:"
            docker compose -f "$COMPOSE_FILE_TMP" logs --tail=200 careergraph-api || true
            exit 1
