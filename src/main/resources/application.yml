# application.yml
spring:
  config:
    import: optional:file:.env.dev[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DATASOURCE_MAX_POOL_SIZE:20}
      minimum-idle: ${DATASOURCE_MIN_IDLE:5}
      connection-timeout: ${DATASOURCE_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DATASOURCE_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DATASOURCE_MAX_LIFETIME_MS:1800000}
      auto-commit: true
      data-source-properties:
        TimeZone: ${DATASOURCE_TIME_ZONE:Asia/Ho_Chi_Minh}
  jpa:
    show-sql: ${JPA_SHOW_SQL:false}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
      format_sql: ${JPA_FORMAT_SQL:false}
    properties:
      "[hibernate.jdbc.time_zone]": ${HIBERNATE_JDBC_TIME_ZONE:Asia/Ho_Chi_Minh}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_REDIS_SSL:false}
      timeout: ${SPRING_REDIS_TIMEOUT:2000ms}
      database: ${SPRING_REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-wait: ${REDIS_POOL_MAX_WAIT:-1ms}
        shutdown-timeout: ${REDIS_SHUTDOWN_TIMEOUT:100ms}
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:20MB}
  ai:
    retry:
      max-attempts: ${SPRING_AI_RETRY_MAX_ATTEMPTS:1}
      on-client-errors: ${SPRING_AI_RETRY_ON_CLIENT_ERRORS:false}
      exclude-on-http-codes: ${SPRING_AI_RETRY_EXCLUDE_ON_HTTP_CODES:429}
      backoff:
        initial-interval: ${SPRING_AI_RETRY_BACKOFF_INITIAL_INTERVAL:1ms}
        max-interval: ${SPRING_AI_RETRY_BACKOFF_MAX_INTERVAL:2ms}
        multiplier: ${SPRING_AI_RETRY_BACKOFF_MULTIPLIER:2}
    google:
      genai:
        project-id: ${GOOGLE_PROJECT_ID:}
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
        embedding:
          api-key: ${GEMINI_API_KEY:}
          text:
            options:
              model: ${GEMINI_EMBEDDING_MODEL:models/gemini-embedding-001}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/careergraph/api/v1}

jwt:
  signer-key: ${JWT_SIGNER_KEY:change-me-in-.env}
  valid-duration: ${JWT_VALID_DURATION:3600}
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:36000}

google:
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}

cookie:
  secure: ${COOKIE_SECURE:false}
  samesite: ${COOKIE_SAMESITE:Lax}

cache:
  user:
    ttl: ${CACHE_USER_TTL:300}

fast-api:
  base-url: ${FAST_API_BASE_URL:http://localhost:8000}

# Sàng lọc AI sau khi ứng viên nộp đơn (async, sau commit). Tắt mặc định để tránh surprise trên môi trường cũ.
application:
  ai-screening:
    enabled: ${APPLICATION_AI_SCREENING_ENABLED:false}
    # Ứng viên được giữ APPLIED nếu matchScore >= giá trị này; dưới ngưỡng → REJECTED (nếu enabled).
    min-score-percent: ${APPLICATION_AI_SCREENING_MIN_SCORE_PERCENT:50}
    max-chars-for-ai-prompt: ${APPLICATION_AI_SCREENING_MAX_PROMPT_CHARS:14000}
  resume-extraction:
    max-download-bytes: ${RESUME_EXTRACTION_MAX_DOWNLOAD_BYTES:15728640}
    max-stored-chars: ${RESUME_EXTRACTION_MAX_STORED_CHARS:50000}
    allowed-hosts: ${RESUME_EXTRACTION_ALLOWED_HOSTS:res.cloudinary.com}
  cv-keywords:
    # Strategy: HEURISTIC (default, instant, no external call) | GEMINI (async AI extract) | HYBRID (heuristic first, gemini override)
    strategy: ${CV_KEYWORDS_STRATEGY:HYBRID}
    max-keywords-chars: ${CV_KEYWORDS_MAX_CHARS:300}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

support:
  email: ${SUPPORT_EMAIL:support@careergraph.com}

mail:
  host: ${MAIL_HOST:smtp.gmail.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  transport-protocol: ${MAIL_TRANSPORT_PROTOCOL:smtp}
  smtp-auth: ${MAIL_SMTP_AUTH:true}
  starttls-enable: ${MAIL_STARTTLS_ENABLE:true}
  debug: ${MAIL_DEBUG:false}

huggingface:
  api-key: ${HUGGING_FACE_KEY:}

embedding:
  service:
    url: ${EMBEDDING_SERVICE_URL:http://localhost:8000}
    expected-dimensions: ${EMBEDDING_SERVICE_EXPECTED_DIMENSIONS:3072}

integration:
  s3:
    endpoint: ${INTEGRATION_S3_ENDPOINT:}
    accessKey: ${INTEGRATION_S3_ACCESS_KEY:}
    secretKey: ${INTEGRATION_S3_SECRET_KEY:}
    bucket: ${INTEGRATION_S3_BUCKET:}
    region: ${INTEGRATION_S3_REGION:}

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:}
  api_key: ${CLOUDINARY_API_KEY:}
  api_secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    root: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate: WARN
    org.springframework.data: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  embed:
    # true: ưu tiên local FastAPI trước; false: ưu tiên Gemini trước.
    use-local-first: ${APP_EMBED_USE_LOCAL_FIRST:true}
    # Nếu local embedding lỗi thì cho phép fallback sang Gemini.
    allow-gemini-fallback: ${APP_EMBED_ALLOW_GEMINI_FALLBACK:${APP_ES_ALLOW_GEMINI_FALLBACK:false}}
  es:
    jobs:
      sync-enabled: ${APP_ES_SYNC_JOBS_ENABLED:false}
      force-full-sync: ${APP_ES_FORCE_FULL_SYNC:false}
      max-embeddings-per-run: ${APP_ES_MAX_EMBEDDINGS_PER_RUN:50}
    candidates:
      sync-enabled: ${APP_ES_SYNC_CANDIDATES_ENABLED:false}
      force-full-sync: ${APP_ES_FORCE_CANDIDATES_FULL_SYNC:false}
      max-embeddings-per-run: ${APP_ES_MAX_CANDIDATE_EMBEDDINGS_PER_RUN:30}
    cron:
      enabled: ${APP_ES_CRON_ENABLED:false}
      jobs:
        enabled: ${APP_ES_CRON_JOBS_ENABLED:true}
        fixed-delay-ms: ${APP_ES_CRON_JOBS_FIXED_DELAY_MS:120000}
        initial-delay-ms: ${APP_ES_CRON_JOBS_INITIAL_DELAY_MS:120000}
        batch-size: ${APP_ES_CRON_JOBS_BATCH_SIZE:10}
      candidates:
        enabled: ${APP_ES_CRON_CANDIDATES_ENABLED:true}
        fixed-delay-ms: ${APP_ES_CRON_CANDIDATES_FIXED_DELAY_MS:240000}
        initial-delay-ms: ${APP_ES_CRON_CANDIDATES_INITIAL_DELAY_MS:240000}
        batch-size: ${APP_ES_CRON_CANDIDATES_BATCH_SIZE:5}
  messaging:
    unsend-window-seconds: ${APP_MESSAGING_UNSEND_WINDOW_SECONDS:60}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
    script-path: ${APP_SEED_SCRIPT_PATH:init-scripts/seed-basic.sql}
    check-table: ${APP_SEED_CHECK_TABLE:jobs}
    min-row-count: ${APP_SEED_MIN_ROW_COUNT:1}

socket:
  # Node.js RTC base URL used by backend to call internal push endpoints.
  server:
    url: ${SOCKET_SERVER_URL:http://localhost:4000}
  # Shared key for backend -> RTC internal API authentication.
  internal:
    api-key: ${SOCKET_INTERNAL_API_KEY:dev-secret-change-in-prod}

notification:
  # Skip creating another NEW_MESSAGE notification in the same thread
  # if there is already an unread one within this cooldown window.
  message:
    cooldown-minutes: ${NOTIFICATION_MESSAGE_COOLDOWN_MINUTES:2}
  # Aggregate rapid application stage changes into one notification
  # by updating the latest matching notification in this time window.
  aggregation:
    window-minutes: ${NOTIFICATION_AGGREGATION_WINDOW_MINUTES:5}
  # Scheduled cleanup retention window for old notifications.
  cleanup:
    days-to-keep: ${NOTIFICATION_CLEANUP_DAYS_TO_KEEP:90}
