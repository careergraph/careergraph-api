# application.yml
spring:
  config:
    import: optional:file:.env.dev[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DATASOURCE_MAX_POOL_SIZE:20}
      minimum-idle: ${DATASOURCE_MIN_IDLE:5}
      connection-timeout: ${DATASOURCE_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DATASOURCE_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DATASOURCE_MAX_LIFETIME_MS:1800000}
      auto-commit: true
      data-source-properties:
        TimeZone: Asia/Ho_Chi_Minh
  jpa:
    show-sql: ${JPA_SHOW_SQL:false}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
      format_sql: ${JPA_FORMAT_SQL:false}
    properties:
      "[hibernate.jdbc.time_zone]": UTC
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_REDIS_SSL:false}
      timeout: ${SPRING_REDIS_TIMEOUT:2000ms}
      database: ${SPRING_REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-wait: ${REDIS_POOL_MAX_WAIT:-1ms}
        shutdown-timeout: ${REDIS_SHUTDOWN_TIMEOUT:100ms}
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:20MB}
  ai:
    google:
      genai:
        project-id: ${GOOGLE_PROJECT_ID:}
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
        embedding:
          api-key: ${GEMINI_API_KEY:}
          text:
            options:
              model: ${GEMINI_EMBEDDING_MODEL:models/gemini-embedding-001}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/careergraph/api/v1}

jwt:
  signer-key: ${JWT_SIGNER_KEY:change-me-in-.env}
  valid-duration: ${JWT_VALID_DURATION:3600}
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:36000}

google:
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}

cookie:
  secure: ${COOKIE_SECURE:false}
  samesite: ${COOKIE_SAMESITE:Lax}

cache:
  user:
    ttl: ${CACHE_USER_TTL:300}

fast-api:
  base-url: ${FAST_API_BASE_URL:http://localhost:8000}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}

support:
  email: ${SUPPORT_EMAIL:support@careergraph.com}

mail:
  host: ${MAIL_HOST:smtp.gmail.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  transport-protocol: ${MAIL_TRANSPORT_PROTOCOL:smtp}
  smtp-auth: ${MAIL_SMTP_AUTH:true}
  starttls-enable: ${MAIL_STARTTLS_ENABLE:true}
  debug: ${MAIL_DEBUG:false}

huggingface:
  api-key: ${HUGGING_FACE_KEY:}

embedding:
  service:
    url: ${EMBEDDING_SERVICE_URL:http://localhost:8000}

integration:
  s3:
    endpoint: ${INTEGRATION_S3_ENDPOINT:}
    accessKey: ${INTEGRATION_S3_ACCESS_KEY:}
    secretKey: ${INTEGRATION_S3_SECRET_KEY:}
    bucket: ${INTEGRATION_S3_BUCKET:}
    region: ${INTEGRATION_S3_REGION:}

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:}
  api_key: ${CLOUDINARY_API_KEY:}
  api_secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    root: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate: WARN
    org.springframework.data: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  messaging:
    unsend-window-seconds: ${APP_MESSAGING_UNSEND_WINDOW_SECONDS:60}
  seed:
    enabled: ${APP_SEED_ENABLED:false}
    script-path: ${APP_SEED_SCRIPT_PATH:init-scripts/seed-basic.sql}
    check-table: ${APP_SEED_CHECK_TABLE:jobs}
    min-row-count: ${APP_SEED_MIN_ROW_COUNT:1}
