# application-dev.yml
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/careergraph}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${DATASOURCE_MIN_IDLE:2}
      connection-timeout: ${DATASOURCE_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DATASOURCE_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DATASOURCE_MAX_LIFETIME_MS:1800000}
      auto-commit: true
      data-source-properties:
        TimeZone: Asia/Ho_Chi_Minh
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${JPA_SHOW_SQL:false}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      "[hibernate.jdbc.time_zone]": UTC
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6479}
      password: ${SPRING_REDIS_PASSWORD:careergraph@Redis2026}
      timeout: ${SPRING_REDIS_TIMEOUT:2000ms}
      database: ${SPRING_REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-wait: ${REDIS_POOL_MAX_WAIT:-1ms}
        shutdown-timeout: ${REDIS_SHUTDOWN_TIMEOUT:100ms}
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

app:
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    script-path: ${APP_SEED_SCRIPT_PATH:init-scripts/seed-basic.sql}
    check-table: ${APP_SEED_CHECK_TABLE:jobs}
    min-row-count: ${APP_SEED_MIN_ROW_COUNT:1}
