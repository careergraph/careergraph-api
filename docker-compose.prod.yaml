name: careergraph-api

services:
  # =============================================
  # INFRASTRUCTURE SERVICES
  # =============================================

  # --- DATABASE: PostgreSQL + PGVector ---
  careergraph-db:
    image: pgvector/pgvector:pg16
    container_name: careergraph-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careergraph}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ${DATA_PATH:-./data}/postgres:/var/lib/postgresql/data
      # /opt/careergraph/data
      # - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - careergraph-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d careergraph"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- CACHE: Redis ---
  careergraph-redis:
    image: redis:7-alpine
    container_name: careergraph-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-careergraph@Redis2026}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-careergraph@Redis2026}
    volumes:
      - ${DATA_PATH:-./data}/redis:/data
    networks:
      - careergraph-network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-careergraph@Redis2026}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- SEARCH: Elasticsearch ---
  careergraph-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    container_name: careergraph-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=es01
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.name=careergraph-cluster
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-512m} -Xmx${ES_HEAP_SIZE:-512m}"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ES_PORT:-9200}:9200"
      - "${ES_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - careergraph-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200/_cluster/health | grep '\"status\":\"green\\|yellow\"'",
        ]
      interval: 15s
      timeout: 10s
      retries: 10

  # =============================================
  # APPLICATION SERVICE
  # =============================================

  # --- APP: Spring Boot API ---
  careergraph-api:
    image: ${DOCKER_IMAGE_REPO_API:-thinz/careergraph-api}:${IMAGE_TAG_API:-latest}
    pull_policy: always
    container_name: careergraph-api
    restart: unless-stopped
    ports:
      - "${SERVER_PORT_EXPOSE:-8080}:${SERVER_PORT_CONTAINER:-8080}"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://careergraph-db:5432/${POSTGRES_DB:-careergraph}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_REDIS_HOST: careergraph-redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-careergraph@Redis2026}
      SPRING_ELASTICSEARCH_URIS: http://careergraph-elasticsearch:9200
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID:-}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.api.rule=Host(`api.thinz.io.vn`) && PathPrefix(`/careergraph`)" 
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    depends_on:
      careergraph-db:
        condition: service_healthy
      careergraph-redis:
        condition: service_healthy
      careergraph-elasticsearch:
        condition: service_healthy
    networks:
      - careergraph-network
      - proxy

# =============================================
# NETWORKS & VOLUMES
# =============================================
networks:
  careergraph-network:
    driver: bridge
  proxy:
    external: true

volumes:
  esdata:
    driver: local
